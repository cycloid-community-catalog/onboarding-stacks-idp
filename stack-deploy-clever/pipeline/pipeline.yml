# Cycloid pipeline — Clever Cloud Three-Tier Application
# Jobs: terraform-plan · terraform-apply · terraform-destroy

shared:
- &task-merge-stack-and-config
  task: merge-stack-and-config
  config:
    platform: linux
    image_resource:
      type: registry-image
      source:
        repository: cycloid/cycloid-toolkit
        tag: latest
    run:
      path: /usr/bin/merge-stack-and-config
    inputs:
    - name: git-stack
      path: stack
    - name: git-config
      path: config
    outputs:
    - name: merged-stack
    params:
      # Terraform root must match terraform_source (merged-stack/). Same pattern as stack-postgresql.
      STACK_PATH: ($ .stack_path $)/terraform
      CONFIG_PATH: ($ .config_root $)/terraform

groups:
- name: overview
  jobs:
  - terraform-plan
  - terraform-apply
- name: destroy
  jobs:
  - terraform-destroy

resource_types:
- name: terraform
  type: registry-image
  source:
    repository: cycloid/terraform-resource
    tag: ((terraform_version))

resources:
- name: git-stack
  type: git
  icon: github-circle
  source:
    uri: "($ .catalog_repository_url $)"
    ($- if eq .stack_version_type "tag" $)
    tag_filter: ($ .stack_version_ref $)
    fetch_tags: true
    ($- else $)
    branch: ($ coalesce .stack_version_ref .catalog_repository_branch $)
    ($- end $)
    ($- if eq .catalog_repository_credential_type "basic_auth" $)
    username: ((($ .catalog_repository_credential_path $).username))
    password: ((($ .catalog_repository_credential_path $).password))
    ($- else if eq .catalog_repository_credential_type "ssh" $)
    private_key: ((($ .catalog_repository_credential_path $).ssh_key))
    ($- end $)
    paths:
    - ($ .stack_path $)/terraform/*
    - ($ .stack_path $)/terraform/module-clever/*

- name: git-config
  type: git
  icon: github-circle
  source:
    uri: "($ .config_repository_url $)"
    branch: ($ .config_repository_branch $)
    ($- if eq .config_repository_credential_type "basic_auth" $)
    username: ((($ .config_repository_credential_path $).username))
    password: ((($ .config_repository_credential_path $).password))
    ($- else if eq .config_repository_credential_type "ssh" $)
    private_key: ((($ .config_repository_credential_path $).ssh_key))
    ($- end $)
    paths:
    - ($ .config_root $)/*

- name: tfstate
  type: terraform
  icon: terraform
  source:
    env_name: "($ .environment $)"
    backend_type: http
    backend_config:
      address: '($ .api_url $)/inventory?jwt=($ .inventory_jwt $)'
      skip_cert_verification: true
    # Passed as Terraform -var (see terraform/variables.tf). env alone does not set var.*.
    vars:
      cy_api_key: ((cy_api_key))
      cy_api_url: ($ .api_url $)
      cy_org: ($ .organization $)
      tf_region: ((tf_region))
      app_subdomain: ((app_subdomain))
      network_group_name: ((network_group_name))
      network_group_description: ((network_group_description))
      network_group_tags: ((network_group_tags))
      postgresql_name: ((postgresql_name))
      postgresql_plan: ((postgresql_plan))
      docker_name: ((docker_name))
      docker_min_instance_count: ((docker_min_instance_count))
      docker_max_instance_count: ((docker_max_instance_count))
      docker_smallest_flavor: ((docker_smallest_flavor))
      docker_biggest_flavor: ((docker_biggest_flavor))
      docker_path_begin: ((docker_path_begin))
      docker_exposed_http_port: ((docker_exposed_http_port))
      app_git_repository: ((app_git_repository))
      app_git_branch: ((app_git_branch))
      app_release_tag: ((app_release_tag))
      app_git_folder: ((app_git_folder))
      app_dockerfile_name: ((app_dockerfile_name))
      app_git_basic_auth: ((app_git_basic_auth))

jobs:
- name: terraform-plan
  serial: true
  plan:
  - in_parallel:
    - get: git-stack
      trigger: true
    - get: git-config
      trigger: true
  - !!merge <<: *task-merge-stack-and-config
  - put: tfstate
    params:
      plan_only: true
      terraform_source: merged-stack/

- name: terraform-apply
  serial: true
  plan:
  - in_parallel:
    - get: git-stack
      trigger: false
      passed: [terraform-plan]
    - get: git-config
      trigger: false
      passed: [terraform-plan]
    - get: tfstate
      trigger: true
      passed: [terraform-plan]
  - !!merge <<: *task-merge-stack-and-config
  - put: tfstate
    params:
      plan_run: true
      terraform_source: merged-stack/

- name: terraform-destroy
  serial: true
  plan:
  - in_parallel:
    - get: git-stack
      trigger: false
    - get: git-config
      trigger: false
  - !!merge <<: *task-merge-stack-and-config
  # Clever provider issue: refresh fails when network group has peers (apps linked).
  # https://github.com/CleverCloud/terraform-provider-clevercloud/issues/337
  - put: tfstate
    params:
      action: destroy
      terraform_source: merged-stack/
      env:
        TF_CLI_ARGS_destroy: "-refresh=false"
