# Cycloid pipeline variables — values are merged into the generated pipeline/variables.yml

#
# Application Git (Clever clones this repo and runs docker build from your Dockerfile)
#

#. app_git_repository (required): https://github.com/my-org/my-app.git
#+ HTTPS URL only (SSH/git@ is not supported). Private GitHub repos need app_git_token or app_git_auth_basic.
app_git_repository: https://github.com/my-org/my-app.git

#. app_git_branch (required): main
#+ Branch used when app_release_tag is empty (latest commit on that branch).
app_git_branch: main

#. app_release_tag (required): ''
#+ Set to a tag (e.g. 1.0.1) to deploy that tag; leave empty to use app_git_branch.
app_release_tag: ""

#. app_git_folder (required): ''
#+ Optional subfolder in the repo where the Dockerfile lives (e.g. apps/api).
app_git_folder: ""

#. app_dockerfile_name (required): Dockerfile
#+ Dockerfile name relative to the application folder.
app_dockerfile_name: Dockerfile

#. app_git_basic_auth (required): ''
#+ StackForms cy_cred basic_auth (pipeline); leave empty for public repos or use username+token below.
app_git_basic_auth: ""

#
# Clever Cloud / infrastructure
#

#. tf_region (required): grahds
tf_region: grahds

#. app_subdomain (required): my-app
app_subdomain: my-app

#. network_group_name (required): my-network
network_group_name: my-network

#. network_group_description (required): ''
network_group_description: ""

#. network_group_tags (required): []
network_group_tags: []

#. postgresql_name (required): pg-myapp
postgresql_name: pg-myapp

#. postgresql_plan (required): xxs_sml
postgresql_plan: xxs_sml

#. docker_name (required): app-myapp
docker_name: app-myapp

#. docker_min_instance_count (required): 1
docker_min_instance_count: 1

#. docker_max_instance_count (required): 2
docker_max_instance_count: 2

#. docker_smallest_flavor (required): XS
docker_smallest_flavor: XS

#. docker_biggest_flavor (required): XS
docker_biggest_flavor: XS

#. docker_path_begin (required): /api
docker_path_begin: /api

#. docker_exposed_http_port (required): 8080
docker_exposed_http_port: 8080

#
# Default variables
#

#. cy_api_key (required): ((admin-api-key.key))
cy_api_key: ((admin-api-key.key))

#. terraform_version (required): '1.14.6'
terraform_version: "1.14.6"
